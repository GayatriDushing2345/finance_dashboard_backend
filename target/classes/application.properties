# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8081

# ─── Database (MySQL 8) ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# Spring Boot 3 uses Hibernate 6; MySQL8Dialect was removed.
# MySQLDialect is the correct class for Hibernate 6 + MySQL 8.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Disable open-in-view to prevent lazy-loading outside transactions
spring.jpa.open-in-view=false

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=non_null

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Must be a Base64-encoded string of at least 32 bytes (256 bits) for HS256.
# Generate: openssl rand -base64 64
app.jwt.secret=4E6452674756C7A7434753777217A25432A462D4A614E645267556B5870327335
# Token validity: 86400000 ms = 24 hours
app.jwt.expiration=86400000

# ─── Monthly spending limit ───────────────────────────────────────────────────
app.monthly-limit=10000.00

# ─── OpenAPI / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

# ─── 404 routing via GlobalExceptionHandler ───────────────────────────────────
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.finance.dashboard=INFO
logging.level.org.springframework.security=WARN
